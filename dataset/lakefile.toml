name = "FormulationBench"
version = "0.1.0"
defaultTargets = ["Common", "Dataset"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
rev = "v4.28.0"

[[lean_lib]]
name = "Common"

[[lean_lib]]
name = "Dataset"
srcDir = "."
globs = ["problems.+", "reformulations.+"]
