name: Release dataset

on:
  push:
    tags:
      - "dataset-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. dataset-v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build dataset tarball
        run: |
          mkdir -p dist
          git archive --format=tar --prefix=dataset/ "${{ steps.tag.outputs.tag }}:dataset" \
            | gzip -9 > dist/dataset.tar.gz
          sha256sum dist/dataset.tar.gz | tee dist/dataset.tar.gz.sha256

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          SHA=$(awk '{print $1}' dist/dataset.tar.gz.sha256)
          SHORT=$(git rev-parse --short "$TAG^{commit}")
          # Strip the leading "<tag>\n\n" subject git prepends for annotated tags,
          # leaving just the body. Falls back to empty for lightweight tags.
          MSG=$(git tag -l --format='%(contents:body)' "$TAG")
          {
            echo "$MSG"
            echo
            echo "Dataset snapshot at $SHORT."
            echo
            echo "sha256: \`$SHA\`"
          } > dist/notes.md
          VERSION="${TAG#dataset-v}"
          PRERELEASE=()
          if [[ "${VERSION%%.*}" == "0" ]]; then
            PRERELEASE=(--prerelease)
          fi
          gh release create "$TAG" \
            dist/dataset.tar.gz dist/dataset.tar.gz.sha256 \
            --title "$TAG" \
            --notes-file dist/notes.md \
            "${PRERELEASE[@]}"
